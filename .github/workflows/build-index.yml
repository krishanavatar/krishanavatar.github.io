name: Build homepage index

# Regenerate the homepage article list + count whenever a post is added or
# changed. The commit the workflow makes carries [skip ci] so it does not
# retrigger itself.
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Regenerate article list
        run: python .github/scripts/build_index.py

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain index.html)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "chore: rebuild homepage article list [skip ci]"
            git push
          else
            echo "index.html already up to date — nothing to commit."
          fi
